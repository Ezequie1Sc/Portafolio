<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Portafolio profesional de Ezequiel Salazar, desarrollador de software" />
  <meta name="keywords" content="portafolio, desarrollador, FLUTTER, DART, JAVA, PYTHON, C#" />
  <meta name="author" content="Ezequiel Salazar" />
  <title>Ezequiel Salazar | Portafolio</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: auto;
      background: #0F172A;
    }

    /* Splash Screen Base */
    #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background: #0F172A;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        transition: opacity 0.8s cubic-bezier(0.77, 0, 0.175, 1), 
                    transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
    }

    #splash-screen.exit {
        opacity: 0;
        transform: scale(1.1);
        pointer-events: none !important;
        display: none !important;
        visibility: hidden !important;
        z-index: -9999 !important;
    }

    /* Animated Background */
    .bg-particles {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
    }

    .particle-line {
        position: absolute;
        width: 1px;
        height: 60px;
        background: linear-gradient(to bottom, transparent, rgba(2, 132, 199, 0.3), transparent);
        animation: particleFloat 3s ease-in-out infinite;
    }

    .particle-line:nth-child(1) { left: 15%; animation-delay: 0s; top: 20%; }
    .particle-line:nth-child(2) { left: 35%; animation-delay: 0.5s; top: 60%; height: 80px; }
    .particle-line:nth-child(3) { left: 55%; animation-delay: 1s; top: 30%; height: 40px; }
    .particle-line:nth-child(4) { left: 75%; animation-delay: 1.5s; top: 50%; }
    .particle-line:nth-child(5) { left: 90%; animation-delay: 2s; top: 70%; height: 50px; }

    @keyframes particleFloat {
        0%, 100% { 
            transform: translateY(0) scale(1);
            opacity: 0.3;
        }
        50% { 
            transform: translateY(-30px) scale(1.5);
            opacity: 0.8;
        }
    }

    /* Background Grid */
    .bg-grid {
        position: absolute;
        width: 100%;
        height: 100%;
        background-image: 
            linear-gradient(90deg, rgba(2, 132, 199, 0.03) 1px, transparent 1px),
            linear-gradient(rgba(2, 132, 199, 0.03) 1px, transparent 1px);
        background-size: 80px 80px;
        opacity: 0.5;
        animation: gridPulse 4s ease-in-out infinite;
    }

    @keyframes gridPulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.6; }
    }

    /* Animated Gradient Blobs */
    .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.04;
        animation: blobMorph 12s ease-in-out infinite;
    }

    .blob-1 {
        width: 600px;
        height: 600px;
        background: linear-gradient(135deg, #0284C7, #0369A1);
        top: -200px;
        right: -150px;
        animation-delay: 0s;
    }

    .blob-2 {
        width: 450px;
        height: 450px;
        background: linear-gradient(135deg, #1e293b, #0F172A);
        bottom: -150px;
        left: -100px;
        animation-delay: 4s;
        animation-duration: 14s;
    }

    .blob-3 {
        width: 350px;
        height: 350px;
        background: linear-gradient(135deg, #0284C7, #38BDF8);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation-delay: 2s;
        animation-duration: 10s;
        opacity: 0.02;
    }

    @keyframes blobMorph {
        0%, 100% { 
            transform: translate(0, 0) scale(1) rotate(0deg);
        }
        33% { 
            transform: translate(50px, -30px) scale(1.1) rotate(120deg);
        }
        66% { 
            transform: translate(-30px, 20px) scale(0.9) rotate(240deg);
        }
    }

    /* Main Content */
    .splash-content {
        position: relative;
        z-index: 10;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 40px;
    }

    /* Code Block Terminal - Enhanced */
    .code-block {
        background: rgba(2, 132, 199, 0.03);
        border: 1px solid rgba(2, 132, 199, 0.2);
        border-radius: 12px;
        padding: 28px;
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        font-size: 13px;
        color: #0284C7;
        letter-spacing: 0.5px;
        line-height: 1.8;
        text-align: left;
        min-width: 320px;
        backdrop-filter: blur(20px);
        box-shadow: 0 0 40px rgba(2, 132, 199, 0.05);
        animation: codeReveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
        opacity: 0;
        position: relative;
        overflow: hidden;
    }

    .code-block::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, transparent, rgba(2, 132, 199, 0.05), transparent);
        animation: codeShine 3s ease-in-out infinite;
    }

    @keyframes codeShine {
        0%, 100% { transform: translateX(-100%); }
        50% { transform: translateX(100%); }
    }

    .code-block::after {
        content: '';
        position: absolute;
        top: -1px;
        left: 20px;
        right: 20px;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(2, 132, 199, 0.3), transparent);
    }

    .code-line {
        display: flex;
        align-items: center;
        margin: 6px 0;
        position: relative;
        padding-left: 12px;
        transition: all 0.3s ease;
    }

    .code-line:hover {
        transform: translateX(5px);
    }

    .code-line.comment {
        color: #475569;
    }

    .code-line span {
        margin-right: 8px;
    }

    .cursor {
        display: inline-block;
        width: 8px;
        height: 18px;
        background: #0284C7;
        margin-left: 4px;
        animation: cursorBlink 0.8s ease-in-out infinite;
        box-shadow: 0 0 10px rgba(2, 132, 199, 0.5);
    }

    @keyframes cursorBlink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.2; }
    }

    @keyframes codeReveal {
        0% {
            opacity: 0;
            transform: translateY(30px) scale(0.95);
        }
        100% {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    /* Text Section - Enhanced */
    .text-section {
        animation: textReveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s forwards;
        opacity: 0;
    }

    .main-name {
        font-size: 3.2rem;
        font-weight: 800;
        color: #F1F5F9;
        letter-spacing: -1px;
        font-family: 'Outfit', sans-serif;
        margin-bottom: 10px;
        line-height: 1.1;
    }

    .role-title {
        font-size: 1rem;
        color: #0284C7;
        font-weight: 600;
        letter-spacing: 3px;
        text-transform: uppercase;
        font-family: 'Outfit', sans-serif;
        position: relative;
        display: inline-block;
    }

    .role-title::before,
    .role-title::after {
        content: '◆';
        color: #0284C7;
        opacity: 0.5;
        margin: 0 10px;
        font-size: 8px;
        animation: diamondPulse 2s ease-in-out infinite;
    }

    .role-title::after {
        animation-delay: 1s;
    }

    @keyframes diamondPulse {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.5); }
    }

    .tagline {
        font-size: 0.9rem;
        color: #64748B;
        font-weight: 300;
        margin-top: 15px;
        letter-spacing: 1px;
        font-family: 'Outfit', sans-serif;
        animation: fadeInUp 0.8s ease 1s forwards;
        opacity: 0;
    }

    @keyframes fadeInUp {
        0% {
            opacity: 0;
            transform: translateY(10px);
        }
        100% {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes textReveal {
        0% {
            opacity: 0;
            transform: translateY(20px);
        }
        100% {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Loading Section - Enhanced */
    .loading-section {
        animation: fadeInUp 0.8s ease 0.8s forwards;
        opacity: 0;
    }

    .loading-bar {
        width: 240px;
        height: 2.5px;
        background: rgba(2, 132, 199, 0.1);
        border-radius: 4px;
        overflow: hidden;
        position: relative;
    }

    .loading-fill {
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, 
            #0284C7, 
            #38BDF8, 
            #0284C7
        );
        background-size: 200% 100%;
        border-radius: 4px;
        box-shadow: 0 0 20px rgba(2, 132, 199, 0.4),
                    0 0 40px rgba(2, 132, 199, 0.2);
        animation: loadProgress 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards,
                   shimmerEffect 2s linear infinite;
    }

    @keyframes loadProgress {
        0% { width: 0; }
        20% { width: 30%; }
        50% { width: 65%; }
        80% { width: 90%; }
        100% { width: 100%; }
    }

    @keyframes shimmerEffect {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
    }

    .loading-text {
        font-size: 0.75rem;
        color: #475569;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-family: 'Outfit', sans-serif;
        margin-top: 15px;
        font-weight: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .status-text {
        animation: statusChange 2.5s steps(1) infinite;
    }

    @keyframes statusChange {
        0%, 25% { content: "Inicializando"; }
        26%, 50% { content: "Cargando módulos"; }
        51%, 75% { content: "Preparando interfaz"; }
        76%, 100% { content: "Listo"; }
    }

    /* Animated Dots */
    .dots {
        display: inline-flex;
        gap: 5px;
    }

    .dot {
        width: 4px;
        height: 4px;
        background: #0284C7;
        border-radius: 50%;
        animation: dotBounce 1.4s ease-in-out infinite;
        box-shadow: 0 0 6px rgba(2, 132, 199, 0.4);
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBounce {
        0%, 100% { opacity: 0.3; transform: translateY(0); }
        50% { opacity: 1; transform: translateY(-8px); }
    }

    /* Floating Elements - Enhanced */
    .floating-elements {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
    }

    .floating-shape {
        position: absolute;
        border: 1px solid rgba(2, 132, 199, 0.15);
        animation: floatRotate 8s ease-in-out infinite;
    }

    .shape-square {
        width: 45px;
        height: 45px;
        border-radius: 8px;
    }

    .shape-circle {
        width: 35px;
        height: 35px;
        border-radius: 50%;
    }

    .shape-diamond {
        width: 35px;
        height: 35px;
        transform: rotate(45deg);
        border-radius: 4px;
    }

    .shape-1 {
        top: 12%;
        left: 8%;
        animation-delay: 0s;
    }

    .shape-2 {
        top: 65%;
        right: 12%;
        animation-delay: 1.5s;
    }

    .shape-3 {
        bottom: 25%;
        left: 15%;
        animation-delay: 3s;
    }

    .shape-4 {
        top: 20%;
        right: 20%;
        animation-delay: 4.5s;
        width: 25px;
        height: 25px;
    }

    @keyframes floatRotate {
        0%, 100% { 
            transform: translate(0, 0) rotate(0deg) scale(1);
            opacity: 0.3;
        }
        25% { 
            transform: translate(15px, -20px) rotate(90deg) scale(1.1);
            opacity: 0.6;
        }
        50% { 
            transform: translate(0, -35px) rotate(180deg) scale(1);
            opacity: 0.3;
        }
        75% { 
            transform: translate(-15px, -20px) rotate(270deg) scale(0.9);
            opacity: 0.6;
        }
    }

    /* Responsive Design */
    @media (max-width: 768px) {
        .code-block {
            min-width: 280px;
            padding: 20px;
            font-size: 12px;
        }

        .main-name {
            font-size: 2.2rem;
        }

        .role-title {
            font-size: 0.85rem;
            letter-spacing: 2px;
        }

        .splash-content {
            gap: 35px;
            padding: 20px;
        }

        .floating-shape {
            display: none;
        }

        .loading-bar {
            width: 200px;
        }
    }

    @media (max-width: 480px) {
        .code-block {
            min-width: 260px;
            padding: 16px;
            font-size: 11px;
        }

        .main-name {
            font-size: 1.8rem;
        }

        .splash-content {
            gap: 30px;
        }
    }
  </style>
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash-screen">
      <!-- Background Elements -->
      <div class="bg-grid"></div>
      <div class="bg-particles">
          <div class="particle-line"></div>
          <div class="particle-line"></div>
          <div class="particle-line"></div>
          <div class="particle-line"></div>
          <div class="particle-line"></div>
      </div>
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>

      <!-- Floating Shapes -->
      <div class="floating-elements">
          <div class="floating-shape shape-square shape-1"></div>
          <div class="floating-shape shape-circle shape-2"></div>
          <div class="floating-shape shape-diamond shape-3"></div>
          <div class="floating-shape shape-circle shape-4"></div>
      </div>

      <!-- Main Content -->
      <div class="splash-content">
          <!-- Enhanced Code Block -->
          <div class="code-block">
              <div class="code-line comment">
                  <span style="color: #64748B;">/**</span>
              </div>
              <div class="code-line comment">
                  <span style="color: #64748B;"> * <span style="color: #06b6d4;">Welcome to my digital universe</span></span>
              </div>
              <div class="code-line comment">
                  <span style="color: #64748B;"> */</span>
              </div>
              <div class="code-line">
                  <span style="color: #8b5cf6;">const</span>
                  <span style="color: #38BDF8;">developer</span>
                  <span style="color: #ec4899;">=</span>
                  <span style="color: #fbbf24;">{</span>
              </div>
              <div class="code-line">
                  <span style="color: #06b6d4;">  name</span>
                  <span style="color: #ec4899;">:</span>
                  <span style="color: #10b981;">"Ezequiel Salazar"</span>
                  <span style="color: #ec4899;">,</span>

          <!-- Text Content -->
          <div class="text-section">
              <h1 class="main-name">Ezequiel Salazar</h1>
              <p class="role-title">Desarrollador de Software</p>

          <!-- Enhanced Loading Section -->
          <div class="loading-section">
              <div class="loading-bar">

              </div>

                  <span class="status-text">Inicializando sistema</span>
                  <span class="dots">
                      <span class="dot"></span>
                      <span class="dot"></span>

                  </span>
              </p>
          </div>
      </div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  
  <!-- Enhanced Splash Controller -->
  <script>
    function removeSplashScreen() {
        const splashScreen = document.getElementById('splash-screen');
        if (splashScreen) {
            splashScreen.classList.add('exit');
            
            setTimeout(() => {
                splashScreen.style.display = 'none';
                splashScreen.style.visibility = 'hidden';
                splashScreen.style.pointerEvents = 'none';
                splashScreen.style.zIndex = '-9999';
                
                // Restaurar scroll
                document.body.style.overflow = 'auto';
                document.body.style.height = 'auto';
                document.documentElement.style.overflow = 'auto';
                document.documentElement.style.height = 'auto';
                
                // Remover completamente
                setTimeout(() => {
                    splashScreen.remove();
                }, 100);
            }, 800);
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const splashScreen = document.getElementById('splash-screen');
        const statusText = document.querySelector('.status-text');
        
        // Array de estados de carga
        const loadingStates = [
            'Inicializando sistema',
            'Cargando módulos',
            'Preparando interfaz',
            'Listo'
        ];
        
        // Cambiar texto de estado durante la carga
        let stateIndex = 0;
        const stateInterval = setInterval(() => {
            if (stateIndex < loadingStates.length) {
                statusText.textContent = loadingStates[stateIndex];
                stateIndex++;
            }
        }, 400);
        
        // Cerrar splash screen más rápido en mobile
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const closeTime = isMobile ? 2000 : 2800;
        
        // Tiempo total antes de la salida
        setTimeout(() => {
            clearInterval(stateInterval);
            statusText.textContent = '¡Listo!';
            
            // Pequeña pausa antes de salir
            setTimeout(() => {
                removeSplashScreen();
            }, 300);
            
        }, closeTime);
        
        // Cerrar también si el usuario hace click o toca la pantalla
        document.addEventListener('click', function() {
            clearInterval(stateInterval);
            removeSplashScreen();
        }, { once: true });
    });
  </script>
</body>
